<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>歴史人物型 深掘り自己分析</title>
<style>
* {
  box-sizing: border-box;
}

:root {
  color: #17202a;
  background: #f4f6f8;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
}

body {
  margin: 0;
  min-width: 320px;
  background: #f4f6f8;
}

button,
input {
  font: inherit;
}

button {
  touch-action: manipulation;
}

.app-shell {
  width: min(1220px, calc(100% - 32px));
  margin: 0 auto;
  padding: 28px 0 72px;
}

.app-header {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 20px;
  align-items: end;
  margin-bottom: 18px;
  padding: 22px;
  border: 1px solid #d9e1e8;
  border-radius: 8px;
  background: #ffffff;
}

.app-header.compact {
  align-items: center;
}

.kicker {
  margin: 0 0 8px;
  color: #8a4f2a;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2,
h3,
p {
  letter-spacing: 0;
}

.app-header h1 {
  margin: 0;
  font-size: 40px;
  line-height: 1.12;
}

.header-copy {
  max-width: 760px;
  margin: 12px 0 0;
  color: #4d5d6c;
  line-height: 1.75;
}

.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
}

.button {
  display: inline-flex;
  min-height: 42px;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 10px 14px;
  cursor: pointer;
  font-weight: 800;
  line-height: 1;
}

.button.primary {
  background: #1f4f5b;
  color: #ffffff;
}

.button.secondary {
  background: #f2e4d8;
  border-color: #d9b99f;
  color: #5c341b;
}

.button.ghost {
  background: #ffffff;
  border-color: #cfd9e2;
  color: #26323f;
}

.button.full {
  width: 100%;
}

.button:disabled {
  cursor: not-allowed;
  opacity: .42;
}

.intake-layout {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr);
  gap: 18px;
  align-items: start;
}

.progress-panel {
  position: sticky;
  top: 16px;
  display: grid;
  gap: 16px;
  padding: 18px;
  border: 1px solid #d9e1e8;
  border-radius: 8px;
  background: #ffffff;
}

.progress-count {
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.progress-count strong {
  font-size: 48px;
  line-height: 1;
}

.progress-count span {
  color: #657584;
  font-weight: 800;
}

.progress-track,
.score-meter {
  display: block;
  height: 10px;
  overflow: hidden;
  border-radius: 6px;
  background: #e2e8ef;
}

.progress-track i,
.score-meter i {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: #2f6f73;
}

.progress-text {
  margin: 0;
  color: #526273;
  font-size: 14px;
  line-height: 1.65;
}

.question-list {
  display: grid;
  gap: 10px;
}

.persona-panel,
.result-side,
.focus-panel,
.workbook-panel,
.detail-panel,
.summary-panel {
  border: 1px solid #d9e1e8;
  border-radius: 8px;
  background: #ffffff;
}

.question-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  gap: 16px;
  align-items: center;
  margin: 0;
  padding: 16px 18px;
  scroll-margin-top: 18px;
  border: 1px solid #d9e1e8;
  border-radius: 8px;
  background: #ffffff;
}

.question-row legend {
  display: flex;
  gap: 10px;
  float: left;
  width: 100%;
  color: #243241;
  line-height: 1.7;
}

.question-row legend span {
  flex: 0 0 auto;
  min-width: 32px;
  color: #8a4f2a;
  font-weight: 900;
}

.question-row legend::after {
  content: "";
  display: block;
  clear: both;
}

.scale {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 6px;
  min-width: 0;
}

.scale-option {
  position: relative;
  display: grid;
  height: 40px;
  place-items: center;
  border: 1px solid #cbd6df;
  border-radius: 6px;
  background: #ffffff;
  cursor: pointer;
  font-weight: 900;
}

.scale-option input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

.scale-option.selected {
  border-color: #1f4f5b;
  background: #1f4f5b;
  color: #ffffff;
}

.result-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 360px;
  gap: 18px;
  align-items: start;
}

.persona-panel {
  padding: 22px;
}

.persona-head {
  display: grid;
  grid-template-columns: 180px minmax(0, 1fr);
  gap: 20px;
  align-items: center;
}

.persona-image {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border: 1px solid #d9e1e8;
  border-radius: 8px;
  background: #eef3f5;
}

.persona-head h2 {
  margin: 0;
  font-size: 32px;
  line-height: 1.2;
}

.persona-type {
  margin: 8px 0 0;
  color: #8a4f2a;
  font-weight: 900;
}

.persona-summary {
  margin: 12px 0 0;
  color: #405163;
  line-height: 1.75;
}

.radar-panel {
  margin-top: 20px;
  padding: 18px;
  border: 1px solid #e2e8ef;
  border-radius: 8px;
  background: #fbfcfd;
}

.radar-heading {
  display: flex;
  gap: 14px;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.radar-heading h2,
.side-section h2,
.note-panel h2,
.section-heading h2 {
  margin: 0;
  font-size: 20px;
}

.legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  color: #526273;
  font-size: 13px;
  font-weight: 800;
}

.legend span {
  display: inline-flex;
  gap: 6px;
  align-items: center;
}

.legend i {
  width: 14px;
  height: 8px;
  border-radius: 3px;
}

.legend-user {
  background: #2f6f73;
}

.legend-type {
  background: #9b5c2e;
}

.radar-chart {
  display: block;
  width: min(100%, 520px);
  height: auto;
  margin: 0 auto;
}

.radar-ring {
  fill: none;
  stroke: #d8e1e9;
  stroke-width: 1;
}

.radar-axis {
  stroke: #d8e1e9;
  stroke-width: 1;
}

.radar-user {
  fill: rgba(47, 111, 115, .22);
  stroke: #2f6f73;
  stroke-width: 3;
}

.radar-type {
  fill: rgba(155, 92, 46, .16);
  stroke: #9b5c2e;
  stroke-width: 2;
}

.radar-chart text {
  fill: #405163;
  font-size: 14px;
  font-weight: 900;
}

.result-side {
  display: grid;
  gap: 16px;
  padding: 18px;
}

.side-section,
.note-panel {
  display: grid;
  gap: 12px;
}

.rank-list,
.score-list {
  display: grid;
  gap: 10px;
}

.rank-card {
  display: grid;
  grid-template-columns: 58px minmax(0, 1fr);
  gap: 10px;
  align-items: center;
  padding: 10px;
  border: 1px solid #e2e8ef;
  border-radius: 8px;
  background: #fbfcfd;
}

.rank-image {
  width: 58px;
  height: 58px;
  object-fit: cover;
  border-radius: 6px;
  background: #eef3f5;
}

.rank-line {
  display: flex;
  gap: 10px;
  justify-content: space-between;
  color: #17202a;
}

.rank-card p,
.rank-card small {
  display: block;
  margin: 4px 0 0;
  color: #526273;
  line-height: 1.4;
}

.score-row {
  display: grid;
  grid-template-columns: minmax(94px, 1fr) minmax(110px, 1.2fr) 42px;
  gap: 10px;
  align-items: center;
}

.score-label {
  display: grid;
  gap: 2px;
}

.score-label small {
  color: #657584;
  font-size: 11px;
  line-height: 1.35;
}

.score-row strong {
  text-align: right;
}

.note-panel {
  padding: 14px;
  border: 1px solid #d2e4df;
  border-radius: 8px;
  background: #f4fbf8;
}

.note-panel p {
  margin: 0;
  color: #405163;
  line-height: 1.65;
}

.focus-panel,
.workbook-panel,
.detail-panel,
.summary-panel {
  margin-top: 18px;
  padding: 22px;
}

.section-heading {
  margin-bottom: 16px;
}

.focus-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.focus-card,
.workbook-step,
.detail-card,
.info-section {
  border: 1px solid #dfe7ee;
  border-radius: 8px;
  background: #ffffff;
}

.focus-card {
  padding: 16px;
}

.focus-top {
  display: grid;
  grid-template-columns: 36px minmax(0, 1fr);
  gap: 8px 10px;
  align-items: center;
}

.focus-top span {
  display: grid;
  width: 34px;
  height: 34px;
  place-items: center;
  border-radius: 6px;
  background: #26323f;
  color: #ffffff;
  font-weight: 900;
}

.focus-top small {
  grid-column: 2;
  color: #8a4f2a;
  font-weight: 900;
}

.focus-card p {
  margin: 12px 0;
  color: #405163;
  line-height: 1.75;
}

.focus-question {
  border-left: 4px solid #2f6f73;
  padding-left: 10px;
  color: #26323f;
  font-weight: 800;
  line-height: 1.6;
}

.workbook-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}

.workbook-step {
  padding: 14px;
  background: #fbfcfd;
}

.workbook-step span {
  display: grid;
  width: 30px;
  height: 30px;
  place-items: center;
  margin-bottom: 10px;
  border-radius: 6px;
  background: #1f4f5b;
  color: #ffffff;
  font-weight: 900;
}

.workbook-step p {
  margin: 8px 0 0;
  color: #526273;
  line-height: 1.6;
}

.detail-list {
  display: grid;
  gap: 12px;
}

.detail-card {
  overflow: hidden;
}

.detail-head {
  display: grid;
  width: 100%;
  grid-template-columns: 48px minmax(0, 1fr) 126px;
  gap: 12px;
  align-items: center;
  border: 0;
  background: #ffffff;
  padding: 14px;
  cursor: pointer;
  text-align: left;
}

.detail-code {
  display: grid;
  width: 40px;
  height: 40px;
  place-items: center;
  border-radius: 6px;
  background: #26323f;
  color: #ffffff;
  font-weight: 900;
}

.detail-title {
  display: grid;
  gap: 3px;
}

.detail-title b {
  font-size: 18px;
}

.detail-title small {
  color: #657584;
  line-height: 1.4;
}

.mini-score {
  display: grid;
  justify-items: end;
  gap: 2px;
}

.mini-score strong {
  font-size: 22px;
}

.mini-score small {
  color: #8a4f2a;
  font-weight: 900;
}

.detail-body {
  display: grid;
  gap: 12px;
  padding: 14px;
  border-top: 1px solid #e2e8ef;
  background: #fbfcfd;
}

.two-col {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.info-section {
  padding: 14px;
}

.info-section h3 {
  margin: 0 0 10px;
  font-size: 15px;
}

.info-section p {
  margin: 0;
  color: #405163;
  line-height: 1.72;
}

.info-section ul {
  margin: 0;
  padding-left: 20px;
  color: #405163;
  line-height: 1.72;
}

.info-section li + li {
  margin-top: 5px;
}

.core-question {
  margin-top: 10px !important;
  padding: 10px;
  border-radius: 6px;
  background: #eef3f5;
  font-weight: 800;
}

.tone-strength {
  background: #f7fbf4;
  border-color: #cce4c2;
}

.tone-shadow {
  background: #fff8f5;
  border-color: #f1cbbb;
}

.tone-signal {
  background: #f4f8fc;
  border-color: #cbdced;
}

.tone-avoid {
  background: #fff9ed;
  border-color: #edd3a4;
}

.tone-question {
  background: #f8f6ff;
  border-color: #d8d1f3;
}

.tone-experiment {
  background: #f3fbf8;
  border-color: #bfe0d5;
}

.tone-request {
  background: #f7f9fb;
  border-color: #d2dbe4;
}

.band-veryHigh,
.band-high {
  border-color: #b9d9ce;
}

.band-low,
.band-veryLow {
  border-color: #e7c8b9;
}

.summary-panel pre {
  max-height: 420px;
  overflow: auto;
  margin: 0;
  padding: 16px;
  border: 1px solid #d9e1e8;
  border-radius: 8px;
  background: #17202a;
  color: #edf2f7;
  font: 14px/1.75 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  white-space: pre-wrap;
}

.toast {
  position: fixed;
  z-index: 20;
  right: 18px;
  bottom: 18px;
  max-width: min(360px, calc(100vw - 36px));
  padding: 12px 14px;
  border-radius: 8px;
  background: #17202a;
  color: #ffffff;
  box-shadow: 0 16px 40px rgba(23, 32, 42, .18);
  font-weight: 800;
}

@media (max-width: 980px) {
  .app-shell {
    width: min(100% - 24px, 1220px);
    padding-top: 16px;
  }

  .app-header,
  .intake-layout,
  .result-layout,
  .persona-head,
  .focus-grid,
  .workbook-grid,
  .two-col {
    grid-template-columns: 1fr;
  }

  .progress-panel {
    position: static;
  }

  .question-row {
    grid-template-columns: 1fr;
  }

  .persona-image {
    width: 150px;
    height: 150px;
  }
}

@media (max-width: 640px) {
  .app-header {
    padding: 16px;
  }

  .app-header h1 {
    font-size: 30px;
  }

  .header-actions {
    justify-content: stretch;
  }

  .header-actions .button {
    flex: 1 1 120px;
  }

  .progress-count strong {
    font-size: 40px;
  }

  .question-row,
  .persona-panel,
  .result-side,
  .focus-panel,
  .workbook-panel,
  .detail-panel,
  .summary-panel {
    padding: 14px;
  }

  .scale {
    gap: 5px;
  }

  .scale-option {
    height: 38px;
  }

  .detail-head {
    grid-template-columns: 42px minmax(0, 1fr);
  }

  .mini-score {
    grid-column: 2;
    justify-items: start;
  }
}

</style>
</head>
