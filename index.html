<!doctype html>
<html lang="ja">
<head>

<title>歴史人物型 深掘り自己分析</title>
<style>
* {
  box-sizing: border-box;
}

:root {
  color: #17202a;
  background: #f4f6f8;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
}

body {
  margin: 0;
  min-width: 320px;
  background: #f4f6f8;
}

button,
input {
  font: inherit;
}

button {

}

.app-shell {

  margin: 0 auto;
  padding: 28px 0 72px;
}

.app-header {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 20px;
  align-items: end;
  margin-bottom: 18px;
  padding: 22px;
  border: 1px solid #d9e1e8;
  border-radius: 8px;
  background: #ffffff;
}

.app-header.compact {
  align-items: center;
}

.kicker {
  margin: 0 0 8px;
  color: #8a4f2a;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2,
h3,
p {
  letter-spacing: 0;
}

.app-header h1 {
  margin: 0;
  font-size: 40px;
  line-height: 1.12;
}

.header-copy {
  max-width: 760px;
  margin: 12px 0 0;
  color: #4d5d6c;
  line-height: 1.75;
}

.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
}

.button {
  display: inline-flex;
  min-height: 42px;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 10px 14px;
  cursor: pointer;
  font-weight: 800;
  line-height: 1;
}

.button.primary {
  background: #1f4f5b;
  color: #ffffff;
}

.button.secondary {
  background: #f2e4d8;
  border-color: #d9b99f;
  color: #5c341b;
}

.button.ghost {
  background: #ffffff;
  border-color: #cfd9e2;
  color: #26323f;
}

.button.full {
  width: 100%;
}

.button:disabled {
  cursor: not-allowed;
  opacity: .42;
}

.intake-layout {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr);
  gap: 18px;
  align-items: start;
}

.progress-panel {
  position: sticky;
  top: 16px;
  display: grid;
  gap: 16px;
  padding: 18px;
  border: 1px solid #d9e1e8;
  border-radius: 8px;
  background: #ffffff;
}

.progress-count {
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.progress-count strong {
  font-size: 48px;
  line-height: 1;
}

.progress-count span {
  color: #657584;
  font-weight: 800;
}

.progress-track,
.score-meter {
  display: block;
  height: 10px;
  overflow: hidden;
  border-radius: 6px;
  background: #e2e8ef;
}

.progress-track i,
.score-meter i {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: #2f6f73;
}

.progress-text {
  margin: 0;
  color: #526273;
  font-size: 14px;
  line-height: 1.65;
}

.dimension-nav {
  display: grid;
  gap: 8px;
}

.dimension-chip {
  display: grid;
  grid-template-columns: 30px minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
  min-height: 38px;
  border: 1px solid #d9e1e8;
  border-radius: 6px;
  background: #ffffff;
  color: #26323f;
  cursor: pointer;
  text-align: left;
}

.dimension-chip span {
  display: grid;
  width: 24px;
  height: 24px;
  place-items: center;
  border-radius: 5px;
  background: #eef3f5;
  font-size: 12px;
  font-weight: 900;
}

.dimension-chip b {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.dimension-chip small {
  color: #657584;
  font-weight: 800;
}

.dimension-chip.is-complete {
  border-color: #b9d9ce;
  background: #f3fbf7;
}

.question-list {
  display: grid;
  gap: 16px;
}

.dimension-block,
.persona-panel,
.result-side,
.focus-panel,
.workbook-panel,
.detail-panel,
.summary-panel {
  border: 1px solid #d9e1e8;
  border-radius: 8px;
  background: #ffffff;
}

.dimension-block {
  scroll-margin-top: 18px;
  overflow: hidden;
}

.dimension-heading {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 16px;
  align-items: start;
  padding: 18px;
  border-bottom: 1px solid #e2e8ef;
  background: #fbfcfd;
}

.dimension-code {
  margin: 0 0 6px;
  color: #1f4f5b;
  font-size: 14px;
  font-weight: 900;
}

.dimension-heading h2 {
  margin: 0;
  color: #26323f;
  font-size: 17px;
  line-height: 1.55;
}

.dimension-heading > span {
  min-width: 52px;
  padding: 6px 8px;
  border: 1px solid #d9e1e8;
  border-radius: 6px;
  color: #4d5d6c;
  font-weight: 900;
  text-align: center;
}

.question-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  gap: 16px;
  align-items: center;
  margin: 0;
  padding: 16px 18px;
  border: 0;
  border-bottom: 1px solid #e8eef3;
}

.question-row:last-child {
  border-bottom: 0;
}

.question-row legend {
  display: flex;
  gap: 10px;
  float: left;
  width: 100%;
  color: #243241;
  line-height: 1.7;
}

.question-row legend span {
  flex: 0 0 auto;
  min-width: 32px;
  color: #8a4f2a;
  font-weight: 900;
}

.question-row legend::after {
  content: "";
  display: block;
  clear: both;
}

.scale {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 6px;
  min-width: 0;
}

.scale-option {
  position: relative;
  display: grid;
  height: 40px;
  place-items: center;
  border: 1px solid #cbd6df;
  border-radius: 6px;
  background: #ffffff;
  cursor: pointer;
  font-weight: 900;
}

.scale-option input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

.scale-option.selected {
  border-color: #1f4f5b;
  background: #1f4f5b;
  color: #ffffff;
}

.result-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 360px;
  gap: 18px;
  align-items: start;
}

.persona-panel {
  padding: 22px;
}

.persona-head {
  display: grid;
  grid-template-columns: 180px minmax(0, 1fr);
  gap: 20px;
  align-items: center;
}

.persona-image {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border: 1px solid #d9e1e8;
  border-radius: 8px;
  background: #eef3f5;
}

.persona-head h2 {
  margin: 0;
  font-size: 32px;
  line-height: 1.2;
}

.persona-type {
  margin: 8px 0 0;
  color: #8a4f2a;
  font-weight: 900;
}

.persona-summary {
  margin: 12px 0 0;
  color: #405163;
  line-height: 1.75;
}

.radar-panel {
  margin-top: 20px;
  padding: 18px;
  border: 1px solid #e2e8ef;
  border-radius: 8px;
  background: #fbfcfd;
}

.radar-heading {
  display: flex;
  gap: 14px;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.radar-heading h2,
.side-section h2,
.note-panel h2,
.section-heading h2 {
  margin: 0;
  font-size: 20px;
}

.legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  color: #526273;
  font-size: 13px;
  font-weight: 800;
}

.legend span {
  display: inline-flex;
  gap: 6px;
  align-items: center;
}

.legend i {
  width: 14px;
  height: 8px;
  border-radius: 3px;
}

.legend-user {
  background: #2f6f73;
}

.legend-type {
  background: #9b5c2e;
}

.radar-chart {
  display: block;
  width: min(100%, 520px);
  height: auto;
  margin: 0 auto;
}

.radar-ring {
  fill: none;
  stroke: #d8e1e9;
  stroke-width: 1;
}

.radar-axis {
  stroke: #d8e1e9;
  stroke-width: 1;
}

.radar-user {
  fill: rgba(47, 111, 115, .22);
  stroke: #2f6f73;
  stroke-width: 3;
}

.radar-type {
  fill: rgba(155, 92, 46, .16);
  stroke: #9b5c2e;
  stroke-width: 2;
}

.radar-chart text {
  fill: #405163;
  font-size: 14px;
  font-weight: 900;
}

.result-side {
  display: grid;
  gap: 16px;
  padding: 18px;
}

.side-section,
.note-panel {
  display: grid;
  gap: 12px;
}

.rank-list,
.score-list {
  display: grid;
  gap: 10px;
}

.rank-card {
  display: grid;
  grid-template-columns: 58px minmax(0, 1fr);
  gap: 10px;
  align-items: center;
  padding: 10px;
  border: 1px solid #e2e8ef;
  border-radius: 8px;
  background: #fbfcfd;
}

.rank-image {
  width: 58px;
  height: 58px;
  object-fit: cover;
  border-radius: 6px;
  background: #eef3f5;
}

.rank-line {
  display: flex;
  gap: 10px;
  justify-content: space-between;
  color: #17202a;
}

.rank-card p,
.rank-card small {
  display: block;
  margin: 4px 0 0;
  color: #526273;
  line-height: 1.4;
}

.score-row {
  display: grid;
  grid-template-columns: minmax(94px, 1fr) minmax(110px, 1.2fr) 42px;
  gap: 10px;
  align-items: center;
}

.score-label {
  display: grid;
  gap: 2px;
}

.score-label small {
  color: #657584;
  font-size: 11px;
  line-height: 1.35;
}

.score-row strong {
  text-align: right;
}

.note-panel {
  padding: 14px;
  border: 1px solid #d2e4df;
  border-radius: 8px;
  background: #f4fbf8;
}

.note-panel p {
  margin: 0;
  color: #405163;
  line-height: 1.65;
}

.focus-panel,
.workbook-panel,
.detail-panel,
.summary-panel {
  margin-top: 18px;
  padding: 22px;
}

.section-heading {
  margin-bottom: 16px;
}

.focus-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.focus-card,
.workbook-step,
.detail-card,
.info-section {
  border: 1px solid #dfe7ee;
  border-radius: 8px;
  background: #ffffff;
}

.focus-card {
  padding: 16px;
}

.focus-top {
  display: grid;
  grid-template-columns: 36px minmax(0, 1fr);
  gap: 8px 10px;
  align-items: center;
}

.focus-top span {
  display: grid;
  width: 34px;
  height: 34px;
  place-items: center;
  border-radius: 6px;
  background: #26323f;
  color: #ffffff;
  font-weight: 900;
}

.focus-top small {
  grid-column: 2;
  color: #8a4f2a;
  font-weight: 900;
}

.focus-card p {
  margin: 12px 0;
  color: #405163;
  line-height: 1.75;
}

.focus-question {
  border-left: 4px solid #2f6f73;
  padding-left: 10px;
  color: #26323f;
  font-weight: 800;
  line-height: 1.6;
}

.workbook-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}

.workbook-step {
  padding: 14px;
  background: #fbfcfd;
}

.workbook-step span {
  display: grid;
  width: 30px;
  height: 30px;
  place-items: center;
  margin-bottom: 10px;
  border-radius: 6px;
  background: #1f4f5b;
  color: #ffffff;
  font-weight: 900;
}

.workbook-step p {
  margin: 8px 0 0;
  color: #526273;
  line-height: 1.6;
}

.detail-list {
  display: grid;
  gap: 12px;
}

.detail-card {
  overflow: hidden;
}

.detail-head {
  display: grid;
  width: 100%;
  grid-template-columns: 48px minmax(0, 1fr) 126px;
  gap: 12px;
  align-items: center;
  border: 0;
  background: #ffffff;
  padding: 14px;
  cursor: pointer;
  text-align: left;
}

.detail-code {
  display: grid;
  width: 40px;
  height: 40px;
  place-items: center;
  border-radius: 6px;
  background: #26323f;
  color: #ffffff;
  font-weight: 900;
}

.detail-title {
  display: grid;
  gap: 3px;
}

.detail-title b {
  font-size: 18px;
}

.detail-title small {
  color: #657584;
  line-height: 1.4;
}

.mini-score {
  display: grid;
  justify-items: end;
  gap: 2px;
}

.mini-score strong {
  font-size: 22px;
}

.mini-score small {
  color: #8a4f2a;
  font-weight: 900;
}

.detail-body {
  display: grid;
  gap: 12px;
  padding: 14px;
  border-top: 1px solid #e2e8ef;
  background: #fbfcfd;
}

.two-col {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.info-section {
  padding: 14px;
}

.info-section h3 {
  margin: 0 0 10px;
  font-size: 15px;
}

.info-section p {
  margin: 0;
  color: #405163;
  line-height: 1.72;
}

.info-section ul {
  margin: 0;
  padding-left: 20px;
  color: #405163;
  line-height: 1.72;
}

.info-section li + li {
  margin-top: 5px;
}

.core-question {
  margin-top: 10px !important;
  padding: 10px;
  border-radius: 6px;
  background: #eef3f5;
  font-weight: 800;
}

.tone-strength {
  background: #f7fbf4;
  border-color: #cce4c2;
}

.tone-shadow {
  background: #fff8f5;
  border-color: #f1cbbb;
}

.tone-signal {
  background: #f4f8fc;
  border-color: #cbdced;
}

.tone-avoid {
  background: #fff9ed;
  border-color: #edd3a4;
}

.tone-question {
  background: #f8f6ff;
  border-color: #d8d1f3;
}

.tone-experiment {
  background: #f3fbf8;
  border-color: #bfe0d5;
}

.tone-request {
  background: #f7f9fb;
  border-color: #d2dbe4;
}

.band-veryHigh,
.band-high {
  border-color: #b9d9ce;
}

.band-low,
.band-veryLow {
  border-color: #e7c8b9;
}

.summary-panel pre {
  max-height: 420px;
  overflow: auto;
  margin: 0;
  padding: 16px;
  border: 1px solid #d9e1e8;
  border-radius: 8px;
  background: #17202a;
  color: #edf2f7;
  font: 14px/1.75 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  white-space: pre-wrap;
}

.toast {
  position: fixed;
  z-index: 20;
  right: 18px;
  bottom: 18px;
  max-width: min(360px, calc(100vw - 36px));
  padding: 12px 14px;
  border-radius: 8px;
  background: #17202a;
  color: #ffffff;
  box-shadow: 0 16px 40px rgba(23, 32, 42, .18);
  font-weight: 800;
}

@media (max-width: 980px) {
  .app-shell {
    width: min(100% - 24px, 1220px);
    padding-top: 16px;
  }

  .app-header,
  .intake-layout,
  .result-layout,
  .persona-head,
  .focus-grid,
  .workbook-grid,
  .two-col {
    grid-template-columns: 1fr;
  }

  .progress-panel {
    position: static;
  }

  .dimension-nav {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .question-row {
    grid-template-columns: 1fr;
  }

  .persona-image {
    width: 150px;
    height: 150px;
  }
}

@media (max-width: 640px) {
  .app-header {
    padding: 16px;
  }

  .app-header h1 {
    font-size: 30px;
  }

  .header-actions {
    justify-content: stretch;
  }

  .header-actions .button {
    flex: 1 1 120px;
  }

  .progress-count strong {
    font-size: 40px;
  }

  .dimension-nav {
    grid-template-columns: 1fr;
  }

  .question-row,
  .dimension-heading,
  .persona-panel,
  .result-side,
  .focus-panel,
  .workbook-panel,
  .detail-panel,
  .summary-panel {
    padding: 14px;
  }

  .scale {
    gap: 5px;
  }

  .scale-option {
    height: 38px;
  }

  .detail-head {
    grid-template-columns: 42px minmax(0, 1fr);
  }

  .mini-score {
    grid-column: 2;
    justify-items: start;
  }
}

</style>
</head>

      supportRequests: ["細かい指示より、ゴールと判断基準を明確にしてほしい", "フィードバックは人格評価ではなく、成果物への情報として受け取りたい"],
      avoidLabels: ["指摘は自分への否定だ", "自分のやり方が一番分かっている", "聞くと負けだ"],
    },
  },
};

function getScoreBand(score) {
  const n = Number(score);
  if (!Number.isFinite(n)) return 'middle';
  if (n >= 4.2) return 'veryHigh';
  if (n >= 3.6) return 'high';
  if (n >= 2.6) return 'middle';
  if (n >= 1.8) return 'low';
  return 'veryLow';
}

function getBandLabel(band) {
  switch (band) {
    case 'veryHigh': return '強く出ている';
    case 'high': return 'やや強い';
    case 'middle': return '中間的';
    case 'low': return 'やや控えめ';
    case 'veryLow': return 'かなり控えめ';
    default: return '中間的';
  }
}

function normalizeScores(scores) {
  if (Array.isArray(scores)) {
    return scores.reduce((acc, item) => {
      const id = item.id || item.code || item.dimensionId;
      if (id) acc[id] = Number(item.score ?? item.value);
      return acc;
    }, {});
  }
  return Object.fromEntries(
    Object.entries(scores || {}).map(([key, value]) => {
      if (typeof value === 'number') return [key, value];
      if (value && typeof value === 'object') return [key, Number(value.score ?? value.value)];
      return [key, Number(value)];
    })
  );
}

function pickBandTemplate(template, band) {
  if (!template) return null;
  if (band === 'veryHigh') return template.high;
  if (band === 'veryLow') return template.low;
  return template[band] || template.middle;
}

function addIntensityNote(item, band) {
  if (band === 'veryHigh') {
    return {
      ...item,
      reading: `${item.reading} 今回は特に強く出ているため、強みとして使えている場面と、過剰に出ている場面を分けて見ることが重要です。`,
    };
  }
  if (band === 'veryLow') {
    return {
      ...item,
      reading: `${item.reading} 今回は特に控えめに出ているため、弱点と決めつけず、どんな状況で必要になるかを確認してください。`,
    };
  }
  return item;
}

function getSelfAnalysisForScores(scores) {
  const normalized = normalizeScores(scores);
  return selfAnalysisOrder.map((id) => {
    const template = selfAnalysisTemplates[id];
    const score = Number(normalized[id]);
    const safeScore = Number.isFinite(score) ? score : null;
    const band = getScoreBand(safeScore);
    const selected = addIntensityNote(pickBandTemplate(template, band), band);
    return {
      id,
      score: safeScore,
      band,
      bandLabel: getBandLabel(band),
      ...template,
      ...selected,
    };
  });
}

function getFocusThemes(scores, limit = 3) {
  const feedback = getSelfAnalysisForScores(scores);
  return feedback
    .map((item) => {
      const distanceFromMiddle = Math.abs((item.score ?? 3) - 3);
      const edge = item.score >= 3 ? '強く出ている傾向' : '控えめに出ている傾向';
      return { ...item, distanceFromMiddle, edge };
    })
    .sort((a, b) => b.distanceFromMiddle - a.distanceFromMiddle)
    .slice(0, limit);
}

function buildPersonalSummary({ scores, archetype }) {
  const focus = getFocusThemes(scores, 3);
  const typeName = archetype?.type_name_ja || '現在の近いタイプ';
  const figure = archetype?.figure_ja ? `${archetype.figure_ja}型` : '歴史人物タイプ';
  const focusText = focus
    .map((f) => `- ${f.code}. ${f.name}（${f.bandLabel}）: ${f.reading}`)
    .join('\n');
  const experiments = focus
    .map((f) => `- ${f.shortName}: ${f.experiments?.[0] || '小さな行動実験を一つ選ぶ'}`)
    .join('\n');
  const questions = focus
    .map((f) => `- ${f.shortName}: ${f.reflectionQuestions?.[0] || f.coreQuestion}`)
    .join('\n');

  return `自己分析メモ\n\n近い比喩: ${figure} / ${typeName}\n\n今回深掘りしたいテーマ:\n${focusText}\n\n内省の問い:\n${questions}\n\n次の2週間で試す行動実験:\n${experiments}\n\n注: 歴史人物名は自己理解のための比喩です。能力や人格を断定するものではありません。`;
}

function buildReflectionChecklist(scores) {
  return getFocusThemes(scores, 3).map((f) => ({
    id: f.id,
    name: f.name,
    score: f.score,
    bandLabel: f.bandLabel,
    question: f.reflectionQuestions?.[0] || f.coreQuestion,
    experiment: f.experiments?.[0] || '次に試す小さな行動を一つ決める',
  }));
}

const STORAGE_KEY = "history-persona-self-analysis-answers-v2";
const imageExtensions = ["webp", "jpg", "jpeg", "png"];
const root = document.getElementById("app");

const archetypeData = STANDALONE_ARCHETYPE_DATA;
const archetypes = archetypeData.archetypes || [];

const state = {
  answers: loadInitialAnswers(),
  view: "questions",
  openDetails: {},
  toast: "",
};

if (isComplete(state.answers)) {
  state.view = "results";
}

root.addEventListener("change", (event) => {
  const input = event.target.closest("input[data-question-id]");
  if (!input) return;

  state.answers = {
    ...state.answers,
    [input.dataset.questionId]: Number(input.value),
  };
  saveAnswers(state.answers);
  render();
});

root.addEventListener("click", async (event) => {
  const action = event.target.closest("[data-action]");
  if (!action) return;

  const actionName = action.dataset.action;

  if (actionName === "show-results" && isComplete(state.answers)) {
    state.view = "results";
    renderAndScrollTop();
    return;
  }

  if (actionName === "show-questions") {
    state.view = "questions";
    renderAndScrollTop();
    return;
  }

  if (actionName === "demo") {
    state.answers = sampleAnswers();
    state.view = "results";
    saveAnswers(state.answers);
    renderAndScrollTop();
    return;
  }

  if (actionName === "reset") {
    state.answers = {};
    state.view = "questions";
    state.openDetails = {};
    localStorage.removeItem(STORAGE_KEY);
    renderAndScrollTop();
    return;
  }

  if (actionName === "copy-summary") {
    await copySummary();
    return;
  }

  if (actionName === "toggle-detail") {
    const id = action.dataset.id;
    const open = action.getAttribute("aria-expanded") === "true";
    state.openDetails = { ...state.openDetails, [id]: !open };
    render();
    document.getElementById(`detail-${id}`)?.scrollIntoView({ block: "nearest" });
    return;
  }

  if (actionName === "scroll-to") {
    document.getElementById(`dimension-${action.dataset.id}`)?.scrollIntoView({
      behavior: "smooth",
      block: "start",
    });
  }
});

root.addEventListener(
  "error",
  (event) => {
    const image = event.target;
    if (!(image instanceof HTMLImageElement) || !image.dataset.archetypeId) return;

    const currentIndex = Number(image.dataset.fallbackIndex || 0);
    const nextIndex = currentIndex + 1;

    if (nextIndex < imageExtensions.length) {
      image.dataset.fallbackIndex = String(nextIndex);
      image.src = portraitSrc(image.dataset.archetypeId, nextIndex);
      return;
    }

    image.removeAttribute("data-archetype-id");
    image.src = "/images/archetypes/_placeholder.svg";
  },
  true
);

function loadInitialAnswers() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : {};
  } catch {
    return {};
  }
}

function saveAnswers(answers) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));
}

function sampleAnswers() {
  const values = {};
  for (const question of questions) {
    const base = ["A", "D", "F", "J"].includes(question.dimension) ? 5 : 4;
    values[question.id] = question.reverse ? 6 - base : base;
  }
  return values;
}

function scoreAnswers(answers) {
  const grouped = Object.fromEntries(dimensions.map((dimension) => [dimension.code, []]));

  for (const question of questions) {
    const raw = Number(answers[question.id]);
    if (!Number.isFinite(raw)) continue;
    grouped[question.dimension].push(question.reverse ? 6 - raw : raw);
  }

  return dimensions.map((dimension) => {
    const values = grouped[dimension.code];
    const score = values.length ? values.reduce((sum, value) => sum + value, 0) / values.length : 0;
    return {
      ...dimension,
      completed: values.length,
      score: Number(score.toFixed(2)),
    };
  });
}

function vectorFromScores(scores) {
  return dimensions.map((dimension) => scores.find((score) => score.code === dimension.code)?.score ?? 0);
}

function distanceBetween(a, b) {
  return Math.sqrt(a.reduce((sum, value, index) => sum + (value - b[index]) ** 2, 0));
}

function similarityPercent(distance, dimensionCount = dimensions.length) {
  const maxDistance = Math.sqrt(dimensionCount * 16);
  return Math.max(0, Math.round(100 * (1 - distance / maxDistance)));
}

function rankArchetypes(userVector) {
  return archetypes
    .map((type) => {
      const distance = distanceBetween(userVector, type.scores);
      return { ...type, distance, similarity: similarityPercent(distance, userVector.length) };
    })
    .sort((a, b) => a.distance - b.distance);
}

function isComplete(answers) {
  return questions.every((question) => Number.isFinite(Number(answers[question.id])));
}

function groupedQuestions() {
  return dimensions.map((dimension) => ({
    ...dimension,
    questions: questions.filter((question) => question.dimension === dimension.code),
  }));
}

function analysisContext() {
  const dimensionScores = scoreAnswers(state.answers);
  const userVector = vectorFromScores(dimensionScores);
  const ranked = rankArchetypes(userVector);
  const top = ranked[0] || null;
  const second = ranked[1] || null;
  const hybrid = Boolean(second && top && top.similarity - second.similarity <= 3);

  return {
    complete: isComplete(state.answers),
    completedCount: questions.filter((question) => Number.isFinite(Number(state.answers[question.id]))).length,
    dimensionScores,
    userVector,
    ranked,
    top,
    second,
    hybrid,
  };
}

function render() {
  const context = analysisContext();
  if (state.view === "results" && !context.complete) {
    state.view = "questions";

  root.innerHTML = `

      ${renderToast()}
      ${state.view === "results" && context.complete ? renderResults(context) : renderQuestions(context)}
    </main>
  `;
}

        ${renderSection("次の2週間で試す行動実験", renderList(item.experiments), "experiment")}
      </div>
      ${renderSection("周囲に相談するときの言い方", renderList(item.supportRequests), "request")}
    </div>
  `;
}

function renderSection(title, body, tone = "") {
  return `
    <section class="info-section ${tone ? `tone-${tone}` : ""}">
      <h3>${escapeHtml(title)}</h3>
      ${body}
    </section>
  `;
}

function renderList(items = []) {
  if (!items.length) return "";
  return `<ul>${items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
}

function renderRadar(userVector, archetype) {
  const size = 420;
  const center = size / 2;
  const radius = 150;
  const axes = dimensions.map((dimension, index) => {
    const angle = -Math.PI / 2 + (Math.PI * 2 * index) / dimensions.length;
    return {
      ...dimension,
      angle,
      end: pointOnCircle(center, radius, angle),
      label: pointOnCircle(center, radius + 28, angle),
    };
  });

  const userPoints = polygonPoints(userVector, center, radius);
  const archetypePoints = polygonPoints(archetype.scores, center, radius);

  return `
    <div class="radar-panel">
      <div class="radar-heading">
        <h2>10指標レーダー</h2>
        <div class="legend">
          <span><i class="legend-user"></i>あなた</span>
          <span><i class="legend-type"></i>${escapeHtml(archetype.figure_ja)}型</span>
        </div>
      </div>
      <svg class="radar-chart" viewBox="0 0 ${size} ${size}" role="img" aria-label="10指標レーダーチャート">
        ${[1, 2, 3, 4, 5].map((ring) => renderRadarRing(center, radius, ring)).join("")}
        ${axes.map((axis) => `<line class="radar-axis" x1="${center}" y1="${center}" x2="${axis.end.x}" y2="${axis.end.y}" />`).join("")}
        <polygon class="radar-type" points="${archetypePoints}" />
        <polygon class="radar-user" points="${userPoints}" />
        ${axes.map((axis) => `<text x="${axis.label.x}" y="${axis.label.y}" text-anchor="middle" dominant-baseline="middle">${escapeHtml(axis.short)}</text>`).join("")}
      </svg>
    </div>
  `;
}

function renderRadarRing(center, radius, ring) {
  const values = Array.from({ length: dimensions.length }, (_, index) => {
    const angle = -Math.PI / 2 + (Math.PI * 2 * index) / dimensions.length;
    return pointOnCircle(center, (radius * ring) / 5, angle);
  });
  return `<polygon class="radar-ring" points="${values.map((point) => `${point.x},${point.y}`).join(" ")}" />`;
}

function polygonPoints(values, center, radius) {
  return values
    .map((value, index) => {
      const angle = -Math.PI / 2 + (Math.PI * 2 * index) / values.length;
      const safeValue = Math.max(0, Math.min(5, Number(value)));
      const point = pointOnCircle(center, (radius * safeValue) / 5, angle);
      return `${point.x},${point.y}`;
    })
    .join(" ");
}

function pointOnCircle(center, radius, angle) {
  return {
    x: Number((center + Math.cos(angle) * radius).toFixed(2)),
    y: Number((center + Math.sin(angle) * radius).toFixed(2)),
  };
}

async function copySummary() {
  const context = analysisContext();
  const summary = buildPersonalSummary({ scores: context.dimensionScores, archetype: context.top });

  try {
    await navigator.clipboard.writeText(summary);
  } catch {
    const textarea = document.createElement("textarea");
    textarea.value = summary;
    textarea.setAttribute("readonly", "");
    textarea.style.position = "fixed";
    textarea.style.opacity = "0";
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    textarea.remove();
  }

  state.toast = "自己分析メモをコピーしました";
  render();
  window.setTimeout(() => {
    state.toast = "";
    render();
  }, 2200);
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttribute(value) {
  return escapeHtml(value);
}

render();

</script>
